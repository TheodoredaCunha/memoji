services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - GOOGLE_TRANSLATE_API_KEY=${VITE_GOOGLE_TRANSLATE_API_KEY}
    command: sh -c "npm install && npm run dev -- --host"

  backend:
    image: node:20-alpine
    working_dir: /app/server
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    ports:
      - "3001:3001"
    environment:
      - GOOGLE_TRANSLATE_API_KEY=${VITE_GOOGLE_TRANSLATE_API_KEY}
    command: sh -c "npm install && npm start"